pre-commit:
  commands:
    check:
      stage_fixed: true
      glob: "*.{ts,tsx,css,d.ts}"
      run: pnpm biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
    type-check:
      glob: "platform/**/*.{ts,tsx}"
      # anchor on platform's tsconfig (jsx, paths, react-router types); root has
      # no tsconfig.json to auto-detect, only the extended tsconfig.base.json.
      run: pnpm tsc-files -p platform/tsconfig.json {staged_files}