pre-commit:
  commands:
    check:
      stage_fixed: true
      glob: "*.{ts,tsx,css,d.ts}"
      run: pnpm biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
    type-check:
      glob: "*.{ts,tsx}"
      run: pnpm tsc-files {staged_files}
    # block re-introduction of @base-ui/react (replaced by @ark-ui/react)
    base-ui-guard:
      glob: "*.{ts,tsx}"
      run: |
        if grep -l "@base-ui/react" {staged_files} 2>/dev/null; then
          echo "ERROR: @base-ui/react was removed during ark-ui migration — use @ark-ui/react"
          exit 1
        fi
    # block commit if plaintext env is newer than its .gpg — forces re-encryption
    env-check:
      glob: "scripts/env/content/*.ts"
      run: |
        for f in {staged_files}; do
          gpg_file="${f}.gpg"
          if [ -f "$gpg_file" ] && [ "$f" -nt "$gpg_file" ]; then
            echo "ERROR: $f is newer than $gpg_file — run scripts/env/encrypt.sh"
            exit 1
          fi
        done